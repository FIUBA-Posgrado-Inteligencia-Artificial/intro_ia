name: intro_ia
channels:
  - conda-forge
  - defaults
dependencies:
  - tqdm
  - pip
  - scikit-learn
  - pygame
  - pandas
  - jupyter
  - jupyterlab
  - scipy
  - numpy
  - seaborn
  - python=3.12
  - pyarrow
  - matplotlib
  - ipykernel
  # Spark
  - pyspark # Spark is bundled inside the Python package
  - openjdk=17 # Spark runs on Java Virtual Machine (JVM)
  - pip:
    - vizdoom
